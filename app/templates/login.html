{% extends "base.html" %}
{% block title %}Login — LLM Chat{% endblock %}

{% block content %}
<div style="max-width:420px; margin:48px auto;">
    <div class="card">
        <h2 style="margin-bottom:24px;">Sign in</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <input type="text" name="login" placeholder="Username" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;">
                Login
            </button>
        </form>

        {% if github_enabled %}
        <div style="display:flex; align-items:center; gap:10px; margin:18px 0;">
            <hr style="flex:1; border:none; border-top:1px solid #e0e0e0;">
            <span style="color:#aaa; font-size:13px;">or</span>
            <hr style="flex:1; border:none; border-top:1px solid #e0e0e0;">
        </div>
        <a href="/auth/github" class="btn btn-github" style="width:100%; padding:11px;">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
                -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
                -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64
                -.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93
                -.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            Sign in with GitHub
        </a>
        {% endif %}

        <p style="margin-top:18px; text-align:center; font-size:14px; color:#666;">
            No account yet? <a href="/register" style="color:#1565c0;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
