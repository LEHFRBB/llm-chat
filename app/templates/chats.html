{% extends "base.html" %}
{% block title %}My Chats — LLM Chat{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; flex-wrap:wrap; gap:12px;">
    <h1>My Chats</h1>
    <form method="post" action="/create_chat" style="display:flex; gap:10px;">
        <input type="text" name="title" placeholder="New chat title…" required
               style="padding:9px 14px; border:1px solid #dde1e7; border-radius:8px;
                      font-size:14px; width:240px; background:#fff;">
        <button type="submit" class="btn btn-primary">+ New Chat</button>
    </form>
</div>

{% if chats %}
    {% for chat in chats %}
    <div style="display:flex; align-items:stretch; gap:8px; margin-bottom:12px;">

        <a href="/chat/{{ chat.id }}" style="flex:1; text-decoration:none; color:inherit;">
            <div class="card" style="padding:18px 22px; height:100%; cursor:pointer;
                                     transition:box-shadow 0.15s, transform 0.1s;"
                 onmouseover="this.style.boxShadow='0 4px 20px rgba(0,0,0,0.12)'; this.style.transform='translateY(-1px)'"
                 onmouseout="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.08)'; this.style.transform='none'">
                <div style="font-weight:600; font-size:16px;">{{ chat.title }}</div>
                <div style="font-size:12px; color:#9e9e9e; margin-top:4px;">
                    {{ chat.created_at | datefmt }}
                </div>
            </div>
        </a>

        <form method="post" action="/chat/{{ chat.id }}/delete"
              onsubmit="return confirm('Delete «{{ chat.title }}»?')"
              style="display:flex;">
            <button type="submit" title="Delete chat"
                    style="background:#ffebee; color:#c62828; border:1px solid #ffcdd2;
                           border-radius:10px; cursor:pointer; padding:0 16px;
                           font-size:18px; transition:background 0.15s;"
                    onmouseover="this.style.background='#ef5350'; this.style.color='#fff'"
                    onmouseout="this.style.background='#ffebee'; this.style.color='#c62828'">
                &#128465;
            </button>
        </form>

    </div>
    {% endfor %}
{% else %}
    <div class="card" style="text-align:center; padding:80px 20px; color:#9e9e9e;">
        <div style="font-size:48px; margin-bottom:16px;">&#x1F4AC;</div>
        <div style="font-size:16px;">No chats yet. Create your first one above!</div>
    </div>
{% endif %}
{% endblock %}
