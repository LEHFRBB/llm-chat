{% extends "base.html" %}
{% block title %}{{ chat.title }} — LLM Chat{% endblock %}

{% block content %}
<style>
    .msg-row        { display:flex; margin-bottom:12px; }
    .msg-row.user   { justify-content:flex-end; }
    .msg-row.assistant { justify-content:flex-start; }

    .bubble {
        max-width:72%;
        padding:10px 14px;
        border-radius:16px;
        font-size:14px;
        line-height:1.6;
        word-break:break-word;
        white-space:pre-line;
    }
    .bubble.user {
        background:#1565c0;
        color:#fff;
        border-bottom-right-radius:4px;
    }
    .bubble.assistant {
        background:#f0f4f8;
        color:#1a1a2e;
        border-bottom-left-radius:4px;
    }
    .bubble-label {
        font-size:10px;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:0.6px;
        opacity:0.55;
        margin-bottom:4px;
    }
</style>

<div style="display:flex; align-items:center; gap:14px; margin-bottom:20px;">
    <a href="/" class="btn btn-secondary" style="padding:7px 14px; font-size:13px;">&#8592; Back</a>
    <h2 style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ chat.title }}</h2>
    <form method="post" action="/chat/{{ chat.id }}/delete"
          onsubmit="return confirm('Delete this chat and all its messages?')">
        <button type="submit" class="btn"
                style="background:#ef5350; color:#fff; padding:7px 14px; font-size:13px;">
            &#128465; Delete
        </button>
    </form>
</div>

<div id="messages" style="
    background:#fff;
    border-radius:12px;
    padding:20px;
    min-height:380px;
    max-height:58vh;
    overflow-y:auto;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
    margin-bottom:16px;
">
    {% if messages %}
        {% for msg in messages %}
        <div class="msg-row {{ msg.role }}">
            <div class="bubble {{ msg.role }}">
                <div class="bubble-label">{{ msg.role }}</div>
                {{ msg.content }}
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div style="height:100%; display:flex; flex-direction:column; align-items:center;
                    justify-content:center; color:#bdbdbd; padding:60px 0; gap:12px;">
            <div style="font-size:40px;">&#x1F4AC;</div>
            <div>Start the conversation below.</div>
        </div>
    {% endif %}
</div>

<form id="send-form" method="post" action="/chat/{{ chat.id }}/send"
      style="display:flex; gap:10px; align-items:flex-end;">
    <textarea
        name="content"
        id="msg-input"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        required
        rows="1"
        style="
            flex:1; padding:12px 16px;
            border:1px solid #dde1e7; border-radius:10px;
            font-size:14px; font-family:inherit;
            resize:none; overflow:hidden; line-height:1.5;
            transition:border-color 0.15s, box-shadow 0.15s;
            background:#fff;
        "
    ></textarea>
    <button type="submit" class="btn btn-primary" style="padding:12px 22px; height:46px;">Send</button>
</form>

<script>
    const msgBox = document.getElementById('messages');
    msgBox.scrollTop = msgBox.scrollHeight;

    const ta = document.getElementById('msg-input');
    ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
    });
    ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (ta.value.trim()) document.getElementById('send-form').submit();
        }
    });
    ta.focus();
</script>
{% endblock %}
